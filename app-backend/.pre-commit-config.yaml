# Pre-commit hooks for code quality automation
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # Ruff - Fast Python linter and formatter (replaces black, flake8, isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --config=app-backend/pyproject.toml]
        types_or: [python, pyi]
        files: ^app-backend/
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]
        files: ^app-backend/

  # mypy - Static type checker
#  - repo: https://github.com/pre-commit/mirrors-mypy
#    rev: v1.13.0
#    hooks:
#      - id: mypy
#        additional_dependencies:
#          - pydantic==2.10.2
#          - pydantic-settings==2.6.1
#          - fastapi==0.115.0
#          - sqlalchemy==2.0.23
#          - types-requests
#          - types-PyYAML
#        args: [--config-file=app-backend/pyproject.toml]
#        exclude: ^(app-backend/tests/|app-backend/migrations/)
#        files: ^app-backend/

#  - repo: https://github.com/pre-commit/mirrors-eslint
#    rev: v8.56.0 # Pin to v8 for .eslintrc.json support
#    hooks:
#      - id: eslint
#        files: \.[jt]sx?$  # Only run on js/ts/jsx/tsx files
#        types: [file]
#        additional_dependencies:
#          - eslint@8.56.0
#          - eslint-config-next@14.1.0
#          - eslint-config-prettier@9.1.0
#          - eslint-plugin-react@7.33.2
#          - eslint-plugin-react-hooks@4.6.0
#          - typescript@5.3.3
#          - "@typescript-eslint/eslint-plugin@6.21.0"
#          - "@typescript-eslint/parser@6.21.0"

  # Frontend - Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [css, javascript, tsx, ts, json]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Security checks
#  - repo: https://github.com/PyCQA/bandit
#    rev: 1.7.10
#    hooks:
#      - id: bandit
#        args: [-c, app-backend/pyproject.toml]
#        additional_dependencies: ["bandit[toml]"]
#        exclude: ^app-backend/tests/
#        files: ^app-backend/

# Global settings
default_language_version:
  python: python3.12

# Run hooks in parallel for speed
fail_fast: false
