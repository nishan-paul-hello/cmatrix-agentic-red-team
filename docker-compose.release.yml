services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /var/lib/cmatrix/postgres_data:/var/lib/postgresql/data
    networks:
      - main_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: cmatrix-redis
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000
    volumes:
      - /var/lib/cmatrix/redis_data:/data
    networks:
      - main_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cmatrix-qdrant
    volumes:
      - /var/lib/cmatrix/qdrant_data:/qdrant/storage
    networks:
      - main_network
    restart: unless-stopped

  # Backend Service (Python/FastAPI)
  app-backend:
    image: ghcr.io/nishan-paul-2022/cmatrix-backend:latest
    container_name: cmatrix-app-backend
    # Required for cybersecurity red-team capabilities
    privileged: true
    pid: "host"
    ports:
      - "3012:3012"
    env_file:
      - .env
    environment:
      - HOST_ROOT=/host
    volumes:
      - /:/host
      - /var/www/cmatrix/data:/app/data
      - /var/www/cmatrix/logs:/app/logs
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - main_network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Celery Worker for background jobs
  app-worker:
    image: ghcr.io/nishan-paul-2022/cmatrix-backend:latest
    container_name: cmatrix-app-worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - /var/www/cmatrix/data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - main_network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Service (Next.js)
  app-frontend:
    image: ghcr.io/nishan-paul-2022/cmatrix-frontend:latest
    container_name: cmatrix-app-frontend
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=production
      - PORT=3011
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api-cmatrix.kaiofficial.xyz/api/v1}
      - PYTHON_BACKEND_URL=http://host.docker.internal:3012
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - main_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3011', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  main_network:
    external: true

volumes:
  huggingface_cache:
    driver: local
