
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres-dev
    environment:
      - POSTGRES_USER=cmatrix
      - POSTGRES_PASSWORD=cmatrix
      - POSTGRES_DB=cmatrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  # Backend Service (Development Mode)
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: cmatrix-app-backend-dev
    env_file:
      - .env
    volumes:
      - ./app-backend:/app
      - backend-venv:/app/venv
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload

  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile.dev
    container_name: cmatrix-app-frontend-dev
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NODE_ENV=development
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PYTHON_BACKEND_URL=http://host.docker.internal:3012
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app-frontend:/app
      # Keep node_modules in container to avoid overwriting with local (possibly empty) node_modules
      - /app/node_modules
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - cmatrix-network
    restart: unless-stopped
    user: "root"
    command: sh -c "npm install --legacy-peer-deps && npm run dev"

networks:
  cmatrix-network:
    driver: bridge

volumes:
  backend-venv:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local
