
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres-dev
    environment:
      - POSTGRES_USER=cmatrix
      - POSTGRES_PASSWORD=cmatrix
      - POSTGRES_DB=cmatrix
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Backend Service (Development Mode)
  backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: cmatrix-backend-dev
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://cmatrix:cmatrix@localhost:5432/cmatrix
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - CELERY_RESULT_BACKEND=redis://localhost:6379/1
      - QDRANT_URL=http://localhost:6333
      - QDRANT_HOST=localhost
      - QDRANT_PORT=6333
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production-make-it-very-long-and-random}
    volumes:
      - ./app-backend:/app
      - backend-venv:/app/venv
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile.dev
    container_name: cmatrix-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PYTHON_BACKEND_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app-frontend:/app
      # Keep node_modules in container to avoid overwriting with local (possibly empty) node_modules
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cmatrix-network
    restart: unless-stopped
    command: sh -c "pnpm install && pnpm dev"

networks:
  cmatrix-network:
    driver: bridge

volumes:
  backend-venv:
    driver: local
  postgres_data_dev:
    driver: local
