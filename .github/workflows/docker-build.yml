name: Quality, Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'app-frontend/**'
            backend:
              - 'app-backend/**'
            workflow:
              - '.github/workflows/**'

  quality-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cmatrix
          POSTGRES_PASSWORD: cmatrix
          POSTGRES_DB: cmatrix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: app-frontend
        run: npm ci --legacy-peer-deps

      - name: Run Global Quality Checks (Frontend)
        working-directory: app-frontend
        run: npm run lint && npm run build

  quality-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cmatrix
          POSTGRES_PASSWORD: cmatrix
          POSTGRES_DB: cmatrix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "app-backend/requirements*.txt"

      - name: Install Backend Dependencies
        working-directory: app-backend
        run: uv pip install -r requirements.txt --system

      - name: Run Global Quality Checks (Backend)
        working-directory: app-backend
        run: make quality VENV=

      - name: Create minimal CI .env for tests
        run: |
          echo "APP_NAME=CMatrix" >> .env
          echo "BACKEND_PORT=3012" >> .env
          echo "FRONTEND_PORT=3011" >> .env
          echo "SECRET_KEY=ci-test-key-not-for-production" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=10080" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://cmatrix:cmatrix@localhost:5432/cmatrix" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/1" >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/2" >> .env
          echo "QDRANT_HOST=localhost" >> .env
          echo "QDRANT_PORT=6333" >> .env
          echo "QDRANT_URL=http://localhost:6333" >> .env
          echo "QDRANT_COLLECTION_NAME=cmatrix_memory" >> .env
          echo "EMBEDDING_MODEL=BAAI/bge-base-en-v1.5" >> .env
          echo "EMBEDDING_DEVICE=cpu" >> .env
          echo "LOG_LEVEL=INFO" >> .env

      - name: Run Backend Tests
        working-directory: app-backend
        run: make test VENV=

  quality-gate:
    needs: [changes, quality-frontend, quality-backend]
    if: always() && vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.changes.result }}" == "skipped" ]; then exit 0; fi
          if [ "${{ needs.changes.result }}" != "success" ]; then exit 1; fi
          
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ] && [ "${{ needs.quality-frontend.result }}" != "success" ]; then
            echo "❌ Frontend quality checks failed"
            exit 1
          fi
          
          if [ "${{ needs.changes.outputs.backend }}" == "true" ] && [ "${{ needs.quality-backend.result }}" != "success" ]; then
            echo "❌ Backend quality checks failed"
            exit 1
          fi
          echo "✅ All required quality gates passed"

  build-and-verify:
    needs: [quality-gate, changes]
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Build & Load (Only if changed, else use latest from GHCR as cache)
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app-backend
          load: true
          tags: cmatrix-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app-frontend
          load: true
          tags: cmatrix-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 2: Runtime verification
      - name: Start services for verification
        run: |
          docker compose -f docker-compose.test.yml up -d --remove-orphans
        env:
          BACKEND_IMAGE: cmatrix-backend:test
          FRONTEND_IMAGE: cmatrix-frontend:test

      - name: Wait for Backend Health
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3012/api/v1/health; do echo "Waiting..."; sleep 5; done'

      - name: Wait for Frontend Health
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3011; do echo "Waiting..."; sleep 5; done'

      - name: Stop and Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
        env:
          BACKEND_IMAGE: cmatrix-backend:test
          FRONTEND_IMAGE: cmatrix-frontend:test

      # Step 3: Push (Only if verification passes AND on main branch)
      - name: Push verified images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag cmatrix-backend:test ghcr.io/nishan-paul-2022/cmatrix-backend:latest
          docker tag cmatrix-frontend:test ghcr.io/nishan-paul-2022/cmatrix-frontend:latest
          docker push ghcr.io/nishan-paul-2022/cmatrix-backend:latest
          docker push ghcr.io/nishan-paul-2022/cmatrix-frontend:latest

      # Step 4: Deploy
      - name: Copy release compose file to server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.release.yml"
          target: "/var/www/cmatrix/"

      - name: Deploy on server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/cmatrix
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker network inspect main_network >/dev/null 2>&1 || docker network create main_network
            mv docker-compose.release.yml docker-compose.yml
            docker compose pull
            docker compose up -d --remove-orphans
