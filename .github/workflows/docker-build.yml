name: Quality, Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'app-frontend/**'
            backend:
              - 'app-backend/**'
            workflow:
              - '.github/workflows/**'

  quality-frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-frontend/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: app-frontend
        run: npm ci --legacy-peer-deps
      - name: Run Linting (Fast)
        working-directory: app-frontend
        run: npm run lint

  quality-frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-frontend/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: app-frontend
        run: npm ci --legacy-peer-deps
      - name: Run Build Verification (Slow)
        working-directory: app-frontend
        run: npm run build

  quality-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cmatrix
          POSTGRES_PASSWORD: cmatrix
          POSTGRES_DB: cmatrix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "app-backend/requirements*.txt"

      - name: Create Virtual Environment
        working-directory: app-backend
        run: uv venv

      - name: Install Backend Dependencies
        working-directory: app-backend
        run: uv pip install -r requirements.txt

      - name: Run Quality Checks and Core Tests (Shard 1 Only)
        if: matrix.shard == 1
        working-directory: app-backend
        run: |
          export PYTHONPATH=.
          uv run --no-project ruff check . & P1=$!
          uv run --no-project ruff format --check . & P2=$!
          uv run --no-project ruff check --select TCH app/ & P3=$!
          uv run --no-project mypy app/ & P4=$!
          uv run --no-project bandit -r app/ -c pyproject.toml -s B101,B601 & P5=$!
          wait $P1 && wait $P2 && wait $P3 && wait $P4 && wait $P5
          
          # Run Core tests in shard 1
          uv run --no-project pytest tests app/tests/api/

      - name: Run RAG Tests (Shard 2 Only)
        if: matrix.shard == 2
        working-directory: app-backend
        run: |
          export PYTHONPATH=.
          uv run --no-project pytest app/tests/test_rag/

      - name: Run Reasoning Tests (Shard 3 Only)
        if: matrix.shard == 3
        working-directory: app-backend
        run: |
          export PYTHONPATH=.
          uv run --no-project pytest app/tests/test_reasoning/

      - name: Run Agent Tests (Shard 4 Only)
        if: matrix.shard == 4
        working-directory: app-backend
        run: |
          export PYTHONPATH=.
          uv run --no-project pytest app/tests/agents/ app/tests/test_supervisor.py

      - name: Create minimal CI .env for deployment prep
        run: |
          echo "APP_NAME=CMatrix" >> .env
          echo "BACKEND_PORT=3012" >> .env
          echo "FRONTEND_PORT=3011" >> .env
          echo "SECRET_KEY=ci-test-key-not-for-production" >> .env
          
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=10080" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://cmatrix:cmatrix@localhost:5432/cmatrix" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/1" >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/2" >> .env
          echo "QDRANT_HOST=localhost" >> .env
          echo "QDRANT_PORT=6333" >> .env
          echo "QDRANT_URL=http://localhost:6333" >> .env
          echo "QDRANT_COLLECTION_NAME=cmatrix_memory" >> .env
          echo "EMBEDDING_MODEL=BAAI/bge-base-en-v1.5" >> .env
          echo "EMBEDDING_DEVICE=cpu" >> .env
          echo "LOG_LEVEL=INFO" >> .env

  quality-gate:
    needs: [changes, quality-frontend-lint, quality-frontend-build, quality-backend]
    if: always() && vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.changes.result }}" == "skipped" ]; then exit 0; fi
          if [ "${{ needs.changes.result }}" != "success" ]; then exit 1; fi
          
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            if [ "${{ needs.quality-frontend-lint.result }}" != "success" ] || [ "${{ needs.quality-frontend-build.result }}" != "success" ]; then
              echo "❌ Frontend quality checks failed"
              exit 1
            fi
          fi
          
          if [ "${{ needs.changes.outputs.backend }}" == "true" ] && [ "${{ needs.quality-backend.result }}" != "success" ]; then
            echo "❌ Backend quality checks failed"
            exit 1
          fi
          echo "✅ All required quality gates passed"

  build-backend:
    needs: [quality-gate, changes]
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Backend (Test)
        uses: docker/build-push-action@v5
        with:
          context: ./app-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cmatrix-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/cmatrix-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: [quality-gate, changes]
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Frontend (Test)
        uses: docker/build-push-action@v5
        with:
          context: ./app-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-and-deploy:
    needs: [quality-gate, build-backend, build-frontend]
    if: always() && needs.quality-gate.result == 'success' && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Runtime verification logic (The Pre-flight Check)
      - name: Start services for verification
        run: |
          docker compose -f docker-compose.test.yml up -d --remove-orphans
        env:
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cmatrix-backend:${{ needs.build-backend.result == 'success' && 'test' || 'latest' }}
          FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:${{ needs.build-frontend.result == 'success' && 'test' || 'latest' }}

      - name: Wait for Backend Health
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3012/api/v1/health; do echo "Waiting..."; sleep 5; done'

      - name: Wait for Frontend Health
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3011; do echo "Waiting..."; sleep 5; done'

      - name: Stop and Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
        env:
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cmatrix-backend:test
          FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:test

      # Step 3: Promote Verified Images to Latest
      - name: Push verified images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # We use docker tag here because we already pulled them for the test
          docker tag ghcr.io/${{ github.repository_owner }}/cmatrix-backend:test ghcr.io/${{ github.repository_owner }}/cmatrix-backend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:test ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/cmatrix-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/cmatrix-frontend:latest

      # Step 4: Final Deploy to VPS
      - name: Copy release compose file to server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.release.yml"
          target: "/var/www/cmatrix/"

      - name: Deploy on server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/cmatrix
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker network inspect main_network >/dev/null 2>&1 || docker network create main_network
            mv docker-compose.release.yml docker-compose.yml
            docker compose pull
            docker compose up -d --remove-orphans
